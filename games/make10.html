<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 10! Speed Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#BFE8FF;
    --bg-bottom:#F3FBFF;
    --ink:#1B3358;
    --ink-soft:#5A7BA0;
    --bubble-bg:#FFFFFF;
    --bubble-border:#BFE3FF;
    --bubble-shadow:rgba(41,98,153,0.22);
    --gold:#FFD23F;
    --gold-deep:#FF8C42;
    --gold-text:#7A4300;
    --pearl-rim:#E8B84B;
    --rod-a:#8FA8C4;
    --rod-b:#7C9CC0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'M PLUS Rounded 1c', sans-serif;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 55%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
    overflow-x:hidden;
    position:relative;
  }

  /* ambient floating bubbles */
  .ambient{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .ambient span{
    position:absolute; bottom:-60px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), rgba(255,255,255,.15));
    opacity:.55;
    animation:rise linear infinite;
  }
  @keyframes rise{
    from{ transform:translateY(0) scale(1); }
    to{ transform:translateY(-110vh) scale(1.15); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .ambient{display:none;}
  }

  .stage{ width:100%; max-width:560px; padding:18px; position:relative; z-index:1;}

  .app{
    background:rgba(255,255,255,.55);
    border:2px solid rgba(255,255,255,.7);
    border-radius:28px;
    padding:18px 16px 22px;
    backdrop-filter: blur(6px);
    box-shadow:0 18px 40px rgba(41,98,153,.18);
  }

  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .necklace-wrap{display:flex; flex-direction:column; gap:4px;}
  .necklace-label{font-size:.72rem; color:var(--ink-soft); font-weight:700; padding-left:4px;}
  .necklace-row{display:flex; align-items:center; gap:6px;}
  .rod-badge{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:.85rem;
    color:#7A4300; background:linear-gradient(160deg,#FFE580,var(--gold));
    border:2px solid var(--gold-deep); border-radius:999px; padding:2px 8px;
  }
  .necklace{
    display:flex; gap:5px; padding:6px 10px; border-radius:999px;
    background:linear-gradient(180deg,var(--rod-a),var(--rod-b));
    box-shadow:inset 0 2px 5px rgba(0,0,0,.18);
  }
  .pearl{width:14px;height:14px;border-radius:50%; background:rgba(255,255,255,.28); transition:all .25s ease;}
  .pearl.filled{
    background:radial-gradient(circle at 30% 28%, #FFFBEF, var(--pearl-rim));
    box-shadow:0 0 7px rgba(255,209,74,.85);
    transform:scale(1.05);
  }

  .score-wrap{text-align:right; max-width:170px;}
  .score-label{font-size:.72rem; color:var(--ink-soft); font-weight:700;}
  .score-value{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:1.9rem; line-height:1.1;
    color:var(--ink); word-break:break-all;
  }

  .combo-chip{
    margin-top:2px; display:inline-block;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:.78rem;
    color:#fff; background:linear-gradient(160deg,#FF7A6B,#FF8C42);
    padding:3px 10px; border-radius:999px;
    box-shadow:0 4px 10px rgba(255,122,107,.45);
  }
  .combo-chip.pop{ animation:comboPop .4s ease; }
  .combo-chip.breakaway{ animation:comboBreak .32s ease forwards; }
  @keyframes comboPop{
    0%{ transform:scale(.5); }
    60%{ transform:scale(1.25); }
    100%{ transform:scale(1); }
  }
  @keyframes comboBreak{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(.55); opacity:0; }
  }

  .medal-tracker{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:12px;
  }
  .medal-chip{
    display:flex; align-items:center; gap:4px;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:.95rem;
    padding:4px 10px; border-radius:999px; background:rgba(255,255,255,.7);
    border:2px solid transparent;
  }
  .medal-chip .icon{ font-size:1.05rem; }
  .medal-chip.gold{ border-color:var(--gold-deep); color:#7A4300; }
  .medal-chip.silver{ border-color:#9AA7B4; color:#455566; }
  .medal-chip.bronze{ border-color:#C97A3D; color:#7A4116; }

  main.board{
    position:relative; overflow:hidden;
    background:rgba(255,255,255,.5);
    border-radius:20px;
    padding:16px 12px 20px;
    min-height:260px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:4px;
  }

  .trail{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    max-height:180px;
    overflow-y:auto;
    scroll-behavior:smooth;
  }
  .trail-row{
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
    gap:4px 6px; transform:scale(.6); transform-origin:center;
    transition:opacity .3s ease;
  }
  .trail-arrow{font-size:.9rem; color:var(--ink-soft); opacity:.5; margin:-2px 0;}
  .mini-bubble{
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:.95rem;
    background:var(--bubble-bg); border:2px solid var(--bubble-border); color:var(--ink-soft);
  }
  .mini-bubble.gold{ background:linear-gradient(160deg,#FFE580,var(--gold)); border-color:var(--gold-deep); color:var(--gold-text);}
  .mini-bubble.negative{ background:linear-gradient(160deg,#F3D9FF,#D79CFF); border-color:#A855D6; color:#4A1466; }
  .mini-plus{ font-size:.85rem; color:var(--ink-soft); font-weight:700;}

  .current-row{ padding-top:6px; }
  .goal-chip{
    display:flex; align-items:center; justify-content:center; gap:6px;
    text-align:center; margin:0 auto 10px; width:fit-content;
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:800; font-size:.82rem;
    color:var(--gold-text); background:linear-gradient(160deg,#FFF3D0,#FFE8A8);
    border:2px dashed var(--gold-deep); border-radius:999px; padding:5px 14px;
  }
  .goal-chip b{ font-family:'Baloo 2', sans-serif; font-size:1rem; }
  .equation{
    display:flex; align-items:center; justify-content:center; flex-wrap:nowrap;
    gap:4px 5px;
  }
  .plus{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:1.1rem; color:var(--ink-soft);}

  .bubble{
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.2rem;
    background:var(--bubble-bg); border:3px solid var(--bubble-border);
    box-shadow:0 6px 14px var(--bubble-shadow);
    cursor:pointer; user-select:none; color:var(--ink);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .bubble:hover{ transform:translateY(-3px); }
  .bubble:focus-visible{ outline:3px solid var(--gold-deep); outline-offset:3px; }
  .bubble.selected{
    border-color:var(--gold-deep);
    box-shadow:0 0 0 5px rgba(255,140,66,.32), 0 6px 14px var(--bubble-shadow);
    transform:scale(1.1) translateY(-2px);
  }
  .bubble.gold{
    background:linear-gradient(160deg,#FFE580,var(--gold));
    border-color:var(--gold-deep);
    color:var(--gold-text);
  }
  .bubble.negative{
    background:linear-gradient(160deg,#F3D9FF,#D79CFF);
    border-color:#A855D6;
    color:#4A1466;
  }
  .bubble.pulse-gold{ animation:popGold .6s ease; }
  .bubble.pulse-normal{ animation:popNormal .45s ease; }
  @keyframes popGold{
    0%{ transform:scale(.6) rotate(0deg); box-shadow:0 0 0 rgba(255,209,74,0); }
    35%{ transform:scale(1.55) rotate(-6deg); box-shadow:0 0 34px 14px rgba(255,209,74,.9); }
    55%{ transform:scale(1.25) rotate(5deg); box-shadow:0 0 26px 10px rgba(255,209,74,.75); }
    75%{ transform:scale(1.35) rotate(-2deg); box-shadow:0 0 30px 12px rgba(255,209,74,.8); }
    100%{ transform:scale(1) rotate(0deg); box-shadow:0 6px 14px var(--bubble-shadow); }
  }
  @keyframes popNormal{
    0%{ transform:scale(.75); }
    55%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
  }
  @media (prefers-reduced-motion: reduce){
    .bubble.pulse-gold, .bubble.pulse-normal{ animation:none; }
  }

  .board-flash{
    position:absolute; inset:0; border-radius:20px; pointer-events:none;
    background:radial-gradient(circle, rgba(255,210,63,.65) 0%, rgba(255,140,66,.25) 45%, rgba(255,210,63,0) 72%);
    opacity:0; z-index:5;
  }
  .board-flash.active{ animation:boardFlash .6s ease-out; }
  .board-flash.active-super{
    animation:boardFlashSuper .75s ease-out;
    background:conic-gradient(from 0deg, #FFD23F, #FF6B6B, #6BCBFF, #B79CFF, #6BFFB8, #FFD23F);
  }
  @keyframes boardFlash{
    0%{ opacity:0; }
    15%{ opacity:1; }
    100%{ opacity:0; }
  }
  @keyframes boardFlashSuper{
    0%{ opacity:0; }
    18%{ opacity:.85; }
    100%{ opacity:0; }
  }

  .app.shake{ animation:appShake .45s ease; }
  .app.shake-big{ animation:appShakeBig .55s ease; }
  @keyframes appShake{
    10%,90%{ transform:translateX(-2px); }
    20%,80%{ transform:translateX(4px); }
    30%,50%,70%{ transform:translateX(-7px); }
    40%,60%{ transform:translateX(7px); }
  }
  @keyframes appShakeBig{
    10%,90%{ transform:translateX(-3px) rotate(-.3deg); }
    20%,80%{ transform:translateX(6px) rotate(.3deg); }
    30%,50%,70%{ transform:translateX(-11px) rotate(-.5deg); }
    40%,60%{ transform:translateX(11px) rotate(.5deg); }
  }

  .confetti-particle{
    position:fixed; border-radius:50%; pointer-events:none; z-index:80;
    animation-name:confettiBurst; animation-timing-function:cubic-bezier(.2,.7,.3,1); animation-fill-mode:forwards;
  }
  @keyframes confettiBurst{
    0%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.25) rotate(180deg); opacity:0; }
  }

  .plus-ten-float{
    position:fixed; z-index:90; pointer-events:none;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.6rem;
    color:var(--gold-deep); text-shadow:0 2px 3px rgba(255,255,255,.8), 0 0 10px rgba(255,209,74,.7);
    animation:floatUp .9s ease-out forwards;
    white-space:nowrap;
  }
  .plus-ten-float.super{
    font-size:2rem;
    background:linear-gradient(90deg,#FF6B6B,#FFD23F,#6BCBFF,#B79CFF);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 14px rgba(255,140,66,.6);
  }
  @keyframes floatUp{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:0; }
    18%{ opacity:1; transform:translate(-50%,-65%) scale(1.25); }
    100%{ transform:translate(-50%,-190%) scale(1); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .board-flash.active, .board-flash.active-super, .app.shake, .app.shake-big, .confetti-particle, .plus-ten-float{ animation:none !important; opacity:0 !important; }
  }

  .mode-select{ text-align:center; padding:22px 8px 8px; }
  .game-title{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.55rem;
    color:var(--ink); margin:0 0 4px;
  }
  .mode-select-sub{ font-size:.88rem; color:var(--ink-soft); font-weight:700; margin:0 0 20px; }
  .mode-buttons{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .mode-btn{
    border:none; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:6px; padding:18px 22px; border-radius:22px;
    box-shadow:0 10px 22px rgba(41,98,153,.2); transition:transform .15s ease;
  }
  .mode-btn:hover{ transform:translateY(-4px); }
  .mode-btn:focus-visible{ outline:3px solid var(--ink); outline-offset:3px; }
  .mode-btn-num{ font-family:'Baloo 2', sans-serif; font-weight:800; font-size:2.1rem; line-height:1; }
  .mode-btn-label{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:.82rem; }
  .mode-btn-10{ background:linear-gradient(160deg,#FFE580,var(--gold)); color:#7A4300; }
  .mode-btn-20{ background:linear-gradient(160deg,#BFE3FF,#8FC7FF); color:#123A63; }
  .mode-btn-mix{ background:linear-gradient(160deg,#F3D9FF,#D79CFF); color:#4A1466; }

  .switch-mode-link{
    display:block; margin:14px auto 0; background:none; border:none;
    color:var(--ink-soft); font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:700; font-size:.78rem; text-decoration:underline; cursor:pointer;
  }

  .result-panel{
    margin-top:14px; text-align:center;
    background:linear-gradient(180deg,#FFFDF6,#FFF3D6);
    border:2px solid var(--gold-deep);
    border-radius:18px; padding:16px 14px;
    animation:riseIn .35s ease;
  }
  @keyframes riseIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .result-badge{ font-size:2rem; }
  .result-text{ font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.5rem; color:var(--ink); margin-top:2px;}
  .result-text span{ color:var(--gold-text); }
  .result-sub{ font-size:.85rem; color:var(--ink-soft); margin-top:6px; font-weight:700;}

  .btn-primary{
    margin-top:12px; border:none; cursor:pointer;
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:800; font-size:.95rem;
    color:#7A4300; padding:10px 22px; border-radius:999px;
    background:linear-gradient(160deg,#FFE580,var(--gold));
    box-shadow:0 6px 14px rgba(255,140,66,.35);
    transition:transform .15s ease;
  }
  .btn-primary:hover{ transform:translateY(-2px); }
  .btn-primary:focus-visible{ outline:3px solid var(--ink); outline-offset:3px; }

  .hint{
    text-align:center; font-size:.82rem; color:var(--ink-soft);
    margin:12px 0 0; font-weight:700;
  }

  .back-link{
    display:block; margin:16px auto 0; text-align:center;
    font-size:.75rem; color:var(--ink-soft); font-weight:700; text-decoration:none;
    opacity:.7;
  }
  .back-link:hover{ opacity:1; }
</style>
</head>
<body>

<div class="ambient" id="ambient" aria-hidden="true"></div>

<div class="stage">
  <div class="app" id="appRoot">
    <div class="mode-select" id="modeSelect">
      <h1 class="game-title">Make 10! Speed Link</h1>
      <p class="mode-select-sub">どっちで あそぶ？</p>
      <div class="mode-buttons">
        <button class="mode-btn mode-btn-10" data-target="10" data-mix="false" type="button">
          <span class="mode-btn-num">10</span>
          <span class="mode-btn-label">10ゲーム</span>
        </button>
        <button class="mode-btn mode-btn-20" data-target="20" data-mix="false" type="button">
          <span class="mode-btn-num">20</span>
          <span class="mode-btn-label">20ゲーム</span>
        </button>
        <button class="mode-btn mode-btn-mix" data-target="10" data-mix="true" type="button">
          <span class="mode-btn-num">±10</span>
          <span class="mode-btn-label">たしひき10</span>
        </button>
      </div>
      <a href="../index.html" class="back-link">← ゲームせんたくにもどる</a>
    </div>

    <div class="game-screen" id="gameScreen" hidden>
      <header class="topbar">
        <div class="necklace-wrap">
          <div class="necklace-label">みつけた かいすう</div>
          <div class="necklace-row">
            <div id="rodBadges"></div>
            <div class="necklace" id="necklace"></div>
          </div>
        </div>
        <div class="score-wrap">
          <div class="score-label">スコア</div>
          <div class="score-value" id="scoreValue">0</div>
          <div class="combo-chip" id="comboChip" hidden></div>
        </div>
      </header>

      <div class="medal-tracker" id="medalTracker"></div>

      <main class="board">
        <div class="board-flash" id="boardFlash"></div>
        <div class="trail" id="trail"></div>
        <div class="current-row">
          <div class="goal-chip" id="goalChip"></div>
          <div class="equation" id="equation"></div>
        </div>
        <div class="result-panel" id="resultPanel" hidden>
          <div class="result-badge" id="resultBadge">⭐</div>
          <div class="result-text">こたえは <span id="resultValue"></span></div>
          <div class="result-sub" id="resultSub"></div>
          <button class="btn-primary" id="nextBtn">つぎの もんだいへ</button>
        </div>
      </main>

      <p class="hint" id="hint">2つの すうじを タップしてね</p>
      <button class="switch-mode-link" id="switchModeBtn" type="button">モードをかえる</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- ambient background bubbles ----------
  const ambient = document.getElementById('ambient');
  for(let i=0;i<10;i++){
    const s = document.createElement('span');
    const size = 14 + Math.random()*34;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = (Math.random()*100)+'vw';
    s.style.animationDuration = (14 + Math.random()*14)+'s';
    s.style.animationDelay = (Math.random()*14)+'s';
    ambient.appendChild(s);
  }

  // ---------- state ----------
  let numbers = [];      // {id, value}
  let selectedId = null;
  let score = 0;
  let tensCount = 0;
  let trail = [];         // array of {values:[...], gold:bool per merged pair not tracked; just snapshot}
  let round = 1;
  let idCounter = 1;
  let resultShown = false;
  let lastMergeGold = false;
  let animatingIds = new Set();
  let maxPossibleTens = 0;
  let roundTens = 0;
  let goldCount = 0;
  let silverCount = 0;
  let bronzeCount = 0;
  let currentTarget = 10;
  let mixMode = false;
  let combo = 0;
  let selectTime = null;

  // 万進法: each unit is 10^4 above the previous, all the way to 無量大数 (10^68)
  const bigUnits = ['', '万','億','兆','京','垓','秭','穣','溝','澗','正','載','極','恒河沙','阿僧祇','那由他','不可思議','無量大数'];

  function formatScoreDisplay(num){
    num = Math.floor(num);
    if(num < 10000) return num.toLocaleString('ja-JP');
    const digits = String(num);
    const groups = [];
    let i = digits.length;
    while(i > 0){
      const start = Math.max(0, i - 4);
      groups.unshift(digits.slice(start, i));
      i = start;
    }
    let out = '';
    const total = groups.length;
    groups.forEach((groupStr, k) => {
      const groupNum = parseInt(groupStr, 10);
      if(groupNum === 0) return;
      const unitIndex = total - 1 - k;
      out += groupNum + (bigUnits[unitIndex] || '');
    });
    return out || '0';
  }

  function computeSpeedMultiplier(elapsedMs){
    const s = elapsedMs / 1000;
    if(s <= 1.2) return 3;
    if(s <= 2.5) return 2;
    if(s <= 5) return 1.5;
    return 1;
  }

  const els = {
    equation: document.getElementById('equation'),
    trail: document.getElementById('trail'),
    scoreValue: document.getElementById('scoreValue'),
    necklace: document.getElementById('necklace'),
    rodBadges: document.getElementById('rodBadges'),
    resultPanel: document.getElementById('resultPanel'),
    resultValue: document.getElementById('resultValue'),
    resultSub: document.getElementById('resultSub'),
    goalChip: document.getElementById('goalChip'),
    medalTracker: document.getElementById('medalTracker'),
    comboChip: document.getElementById('comboChip'),
    appRoot: document.getElementById('appRoot'),
    boardFlash: document.getElementById('boardFlash'),
    modeSelect: document.getElementById('modeSelect'),
    gameScreen: document.getElementById('gameScreen'),
    switchModeBtn: document.getElementById('switchModeBtn'),
    nextBtn: document.getElementById('nextBtn'),
    hint: document.getElementById('hint'),
  };

  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  const REDUCE_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- celebration fx: sound ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(ctx, freq, startTime, duration, type, gainPeak){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(gainPeak, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.03);
  }
  function playTenFanfare(combo){
    const ctx = ensureAudio();
    if(!ctx) return;
    const now = ctx.currentTime;
    const semitoneShift = Math.min((combo - 1) * 2, 12);
    const ratio = Math.pow(2, semitoneShift / 12);
    const notes = [523.25, 659.25, 783.99, 1046.50].map(f => f * ratio); // C5 E5 G5 C6
    notes.forEach((freq, i) => playTone(ctx, freq, now + i*0.085, 0.32, 'triangle', 0.24));
    playTone(ctx, 1568.0 * ratio, now + 0.30, 0.24, 'sine', 0.13);
    playTone(ctx, 2093.0 * ratio, now + 0.34, 0.20, 'sine', 0.10);
    if(combo >= 5){
      playTone(ctx, 2637.0 * ratio, now + 0.38, 0.22, 'sine', 0.10);
      playTone(ctx, 3136.0 * ratio, now + 0.42, 0.18, 'sine', 0.08);
    }
  }
  function playMergeTick(){
    const ctx = ensureAudio();
    if(!ctx) return;
    playTone(ctx, 392.0, ctx.currentTime, 0.12, 'sine', 0.08);
  }

  // ---------- celebration fx: visuals ----------
  function spawnConfetti(x, y, combo){
    if(REDUCE_MOTION) return;
    const goldColors = ['#FFD23F','#FF8C42','#FFF3D0','#FFFFFF','#FFE580'];
    const rainbowColors = ['#FFD23F','#FF6B6B','#6BCBFF','#B79CFF','#6BFFB8','#FF9FC0'];
    const colors = combo >= 5 ? rainbowColors : goldColors;
    const count = Math.min(16 + (combo - 1) * 6, 42);
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'confetti-particle';
      const angle = Math.random()*Math.PI*2;
      const dist = 45 + Math.random()*85;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 25;
      p.style.setProperty('--dx', dx+'px');
      p.style.setProperty('--dy', dy+'px');
      p.style.left = x+'px';
      p.style.top = y+'px';
      const size = 4+Math.random()*7;
      p.style.width = size+'px';
      p.style.height = size+'px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (0.55+Math.random()*0.35)+'s';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
  }
  function spawnPlusTen(x, y, combo, speedMult){
    if(REDUCE_MOTION) return;
    const el = document.createElement('div');
    el.className = 'plus-ten-float' + (combo >= 5 ? ' super' : '');
    let label = '+10';
    if(combo >= 2) label += ' ×' + combo;
    if(speedMult > 1) label += ' 🚀×' + speedMult;
    el.textContent = label;
    el.style.left = x+'px';
    el.style.top = y+'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
  function triggerBoardFlash(combo){
    if(REDUCE_MOTION) return;
    els.boardFlash.classList.remove('active', 'active-super');
    void els.boardFlash.offsetWidth; // restart animation
    els.boardFlash.classList.add(combo >= 5 ? 'active-super' : 'active');
    setTimeout(() => els.boardFlash.classList.remove('active', 'active-super'), 750);
  }
  function triggerShake(combo){
    if(REDUCE_MOTION) return;
    els.appRoot.classList.remove('shake', 'shake-big');
    void els.appRoot.offsetWidth;
    els.appRoot.classList.add(combo >= 3 ? 'shake-big' : 'shake');
    setTimeout(() => els.appRoot.classList.remove('shake', 'shake-big'), 560);
  }
  function updateComboChip(combo){
    if(combo >= 2){
      els.comboChip.textContent = (combo >= 5 ? '🔥🔥 ' : '🔥 ') + combo + 'れんぞく！';
      els.comboChip.hidden = false;
      els.comboChip.classList.remove('breakaway', 'pop');
      void els.comboChip.offsetWidth;
      els.comboChip.classList.add('pop');
    }
  }
  function resetCombo(){
    const hadStreak = combo >= 2;
    combo = 0;
    if(hadStreak){
      els.comboChip.classList.remove('pop');
      els.comboChip.classList.add('breakaway');
      setTimeout(() => {
        els.comboChip.hidden = true;
        els.comboChip.classList.remove('breakaway');
      }, 320);
    } else {
      els.comboChip.hidden = true;
    }
  }
  function celebrateTen(bubbleEl, combo, speedMult){
    playTenFanfare(combo);
    triggerBoardFlash(combo);
    triggerShake(combo);
    if(bubbleEl){
      const rect = bubbleEl.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      spawnConfetti(cx, cy, combo);
      spawnPlusTen(cx, cy, combo, speedMult);
    }
    updateComboChip(combo);
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function maxTens(values, target){
    const memo = new Map();
    function solve(remaining){
      if(remaining.length === 0) return 0;
      const key = remaining.slice().sort((a,b)=>a-b).join(',');
      if(memo.has(key)) return memo.get(key);
      let best = solve(remaining.slice(1));
      const first = remaining[0];
      const rest = remaining.slice(1);
      const n = rest.length;
      for(let mask=1; mask < (1<<n); mask++){
        let sum = first;
        const chosen = [];
        for(let b=0;b<n;b++){
          if(mask & (1<<b)){ sum += rest[b]; chosen.push(b); }
        }
        if(sum === target){
          const after = rest.filter((_,idx)=>!chosen.includes(idx));
          const val = 1 + solve(after);
          if(val > best) best = val;
        }
      }
      memo.set(key, best);
      return best;
    }
    return solve(values.slice());
  }

  // ---------- equation generation ----------
  const pairsPool10 = [[1,9],[2,8],[3,7],[4,6],[5,5]];
  const triplesPool20 = [
    [9,8,3],[9,7,4],[9,6,5],[8,7,5],[7,7,6],[9,9,2],[8,8,4],[8,6,6]
  ];

  // 常に6個固定。target=10: ペア×2+フィラー×2、target=20: トリプル×2、mix: ±コンボ×2
  function generateEquation(target, mix){
    let values = [];
    if(mix){
      // (p1+p2+n=10) × 2 = 6個でちょうど2つの10が保証される
      const makeCombo = () => {
        const p1 = randInt(6,9), p2 = randInt(6,9);
        return [p1, p2, -(p1+p2-10)];
      };
      values = [...makeCombo(), ...makeCombo()];
    } else if(target === 20){
      // トリプル×2 = 6個でちょうど2つの20が保証される
      const t1 = triplesPool20[randInt(0, triplesPool20.length-1)];
      const t2 = triplesPool20[randInt(0, triplesPool20.length-1)];
      values = [...t1, ...t2];
    } else {
      // ペア×2 = 4個でベース2つの10を保証、残り2個はフィラー
      const p1 = pairsPool10[randInt(0, pairsPool10.length-1)];
      const p2 = pairsPool10[randInt(0, pairsPool10.length-1)];
      values = [p1[0], p1[1], p2[0], p2[1], randInt(1,9), randInt(1,9)];
    }
    shuffle(values);
    return values.map(v => ({ id: idCounter++, value: v }));
  }

  function startGame(target, mix){
    currentTarget = target;
    mixMode = mix;
    round = 1;
    score = 0;
    tensCount = 0;
    goldCount = 0;
    silverCount = 0;
    bronzeCount = 0;
    selectedId = null;
    trail = [];
    resultShown = false;
    roundTens = 0;
    combo = 0;
    selectTime = null;
    els.comboChip.hidden = true;
    numbers = generateEquation(currentTarget, mixMode);
    maxPossibleTens = maxTens(numbers.map(n => n.value), currentTarget);
    els.modeSelect.hidden = true;
    els.gameScreen.hidden = false;
    els.resultPanel.hidden = true;
    els.hint.textContent = '2つの すうじを タップしてね';
    render();
  }

  function newRound(){
    round += 1;
    numbers = generateEquation(currentTarget, mixMode);
    trail = [];
    selectedId = null;
    resultShown = false;
    roundTens = 0;
    maxPossibleTens = maxTens(numbers.map(n => n.value), currentTarget);
    els.resultPanel.hidden = true;
    els.hint.textContent = '2つの すうじを タップしてね';
    render();
  }

  // ---------- rendering ----------
  function render(){
    renderGoal();
    renderTrail();
    renderEquation();
    renderNecklace();
    renderMedalTracker();
    els.scoreValue.textContent = formatScoreDisplay(score);
  }

  function renderMedalTracker(){
    els.medalTracker.innerHTML =
      '<span class="medal-chip gold"><span class="icon">🥇</span>' + goldCount + '</span>' +
      '<span class="medal-chip silver"><span class="icon">🥈</span>' + silverCount + '</span>' +
      '<span class="medal-chip bronze"><span class="icon">🥉</span>' + bronzeCount + '</span>';
  }

  function renderGoal(){
    if(maxPossibleTens > 0){
      els.goalChip.innerHTML = '🎯 「' + currentTarget + '」は さいだい <b>' + maxPossibleTens + '</b> かい つくれるよ';
      els.goalChip.hidden = false;
    } else {
      els.goalChip.hidden = true;
    }
  }

  function renderTrail(){
    els.trail.innerHTML = '';
    trail.forEach((snapshot) => {
      const row = document.createElement('div');
      row.className = 'trail-row';
      snapshot.forEach((v, idx) => {
        if(idx>0){
          const plus = document.createElement('span');
          plus.className = 'mini-plus';
          plus.textContent = '+';
          row.appendChild(plus);
        }
        const mb = document.createElement('div');
        mb.className = 'mini-bubble' + (v < 0 ? ' negative' : '');
        mb.textContent = v;
        row.appendChild(mb);
      });
      els.trail.appendChild(row);

      const arrow = document.createElement('div');
      arrow.className = 'trail-arrow';
      arrow.textContent = '↓';
      els.trail.appendChild(arrow);
    });
    els.trail.scrollTop = els.trail.scrollHeight;
  }

  function renderEquation(){
    els.equation.innerHTML = '';
    numbers.forEach((n, idx) => {
      if(idx>0){
        const plus = document.createElement('span');
        plus.className = 'plus';
        plus.textContent = '+';
        els.equation.appendChild(plus);
      }
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'bubble';
      b.textContent = n.value;
      b.dataset.id = String(n.id);
      if(n.id === selectedId) b.classList.add('selected');
      if(n.gold) b.classList.add('gold');
      if(n.value < 0) b.classList.add('negative');
      if(animatingIds.has(n.id)) b.classList.add(n.gold ? 'pulse-gold' : 'pulse-normal');
      b.setAttribute('aria-label', 'すうじ ' + n.value);
      b.addEventListener('click', () => onBubbleClick(n.id));
      els.equation.appendChild(b);
    });

    if(numbers.length === 1 && !resultShown){
      resultShown = true;
      setTimeout(showResult, 550);
    }
  }

  function renderNecklace(){
    const filledInRod = tensCount % 10;
    const completedRods = Math.floor(tensCount / 10);

    els.rodBadges.innerHTML = '';
    for(let i=0;i<completedRods;i++){
      const badge = document.createElement('span');
      badge.className = 'rod-badge';
      badge.textContent = '×' + (i+1) + '0';
      els.rodBadges.appendChild(badge);
    }

    els.necklace.innerHTML = '';
    for(let i=0;i<10;i++){
      const p = document.createElement('div');
      p.className = 'pearl' + (i < filledInRod ? ' filled' : '');
      els.necklace.appendChild(p);
    }
  }

  function showResult(){
    const finalValue = numbers[0].value;
    els.resultValue.textContent = finalValue;
    const isPerfect = maxPossibleTens > 0 && roundTens === maxPossibleTens;

    let medalIcon, medalLabel;
    if(isPerfect){
      goldCount += 1; medalIcon = '🥇'; medalLabel = 'ゴールドメダル！';
    } else if(roundTens >= 1){
      silverCount += 1; medalIcon = '🥈'; medalLabel = 'シルバーメダル！';
    } else {
      bronzeCount += 1; medalIcon = '🥉'; medalLabel = 'ブロンズメダル';
    }
    document.getElementById('resultBadge').textContent = medalIcon;

    let sub = medalLabel + '　「' + currentTarget + '」を ' + roundTens + ' かい みつけたよ';
    if(maxPossibleTens > 0) sub += '（さいだい ' + maxPossibleTens + ' かい中）';
    els.resultSub.textContent = sub;
    els.resultPanel.hidden = false;
    els.hint.textContent = '';
    renderMedalTracker();
  }

  // ---------- interaction ----------

  function onBubbleClick(id){
    if(resultShown) return;
    if(selectedId === null){
      selectedId = id;
      selectTime = performance.now();
      render();
      return;
    }
    if(selectedId === id){
      selectedId = null;
      render();
      return;
    }
    doMerge(selectedId, id);
    selectedId = null;
  }

  function doMerge(idA, idB){
    const idxA = numbers.findIndex(n => n.id === idA);
    const idxB = numbers.findIndex(n => n.id === idB);
    if(idxA === -1 || idxB === -1) return;

    const a = numbers[idxA];
    const b = numbers[idxB];
    const sum = a.value + b.value;
    const isGold = sum === currentTarget;

    trail.push(numbers.map(n => n.value));

    const insertAt = Math.min(idxA, idxB);
    const newBubble = { id: idCounter++, value: sum, gold: isGold };

    numbers = numbers.filter(n => n.id !== idA && n.id !== idB);
    numbers.splice(insertAt, 0, newBubble);

    const speedMult = isGold
      ? computeSpeedMultiplier(selectTime !== null ? (performance.now() - selectTime) : 9999)
      : 1;

    if(isGold){
      combo += 1;
      const comboBonus = Math.min((combo - 1) * 2, 20);
      const gained = Math.round((10 + comboBonus) * speedMult);
      score += gained;
      tensCount += 1;
      roundTens += 1;
    } else {
      score += 2;
    }

    animatingIds = new Set([newBubble.id]);
    render();

    if(isGold){
      const bubbleEl = els.equation.querySelector('[data-id="' + newBubble.id + '"]');
      celebrateTen(bubbleEl, combo, speedMult);
    } else {
      playMergeTick();
      resetCombo();
    }

    setTimeout(() => {
      animatingIds = new Set();
      render();
    }, 620);
  }

  els.nextBtn.addEventListener('click', () => {
    roundTens = 0;
    newRound();
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = Number(btn.dataset.target);
      const m = btn.dataset.mix === 'true';
      startGame(t, m);
    });
  });

  els.switchModeBtn.addEventListener('click', () => {
    els.gameScreen.hidden = true;
    els.modeSelect.hidden = false;
  });
})();
</script>
