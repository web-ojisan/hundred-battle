<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 10! Speed Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#0B0E19;
    --bg-bottom:#141930;
    --ink:#E9EEFF;
    --ink-soft:#9fb0e8;
    --bubble-bg:#FFFFFF;
    --bubble-border:#5a80b0;
    --bubble-shadow:rgba(0,0,0,.45);
    --gold:#FFD34D;
    --gold-deep:#FF8A3D;
    --gold-text:#7A4300;
    --pearl-rim:#E8B84B;
    --rod-a:#39456f;
    --rod-b:#2b3252;
  }
  *{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'M PLUS Rounded 1c', sans-serif;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 55%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink); overflow-x:hidden; position:relative;
  }

  .ambient{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .ambient span{
    position:absolute; bottom:-60px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(100,140,255,.25), rgba(80,100,200,.05));
    opacity:.4; animation:rise linear infinite;
  }
  @keyframes rise{
    from{ transform:translateY(0) scale(1); }
    to{ transform:translateY(-110vh) scale(1.15); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){ .ambient{display:none;} }

  .stage{ width:100%; max-width:560px; padding:18px; position:relative; z-index:1;}

  .app{
    background:#141930; border:2px solid #39456f; border-radius:28px;
    padding:18px 16px 22px; box-shadow:0 18px 40px rgba(0,0,0,.5);
  }

  /* topbar */
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; margin-bottom:14px; flex-wrap:wrap;
  }
  .round-track{ display:flex; gap:5px; flex-wrap:wrap; align-items:center; max-width:190px; }
  .round-dot{
    width:16px; height:16px; border-radius:50%;
    background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.18);
    transition:background .3s, border-color .3s, box-shadow .3s;
    flex-shrink:0;
  }
  .round-dot.gold{
    background:radial-gradient(circle at 35% 30%, #FFFBE0, var(--gold));
    border-color:var(--gold-deep); box-shadow:0 0 7px rgba(255,210,63,.65);
  }
  .round-dot.silver{
    background:radial-gradient(circle at 35% 30%, #D8E4EE, #9AA7B4);
    border-color:#7080A0;
  }
  .round-dot.bronze{
    background:radial-gradient(circle at 35% 30%, #D4A87A, #C97A3D);
    border-color:#8A4A18;
  }
  .round-dot.current{
    border-color:var(--ink-soft); border-style:dashed;
    animation:dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse{ 0%,100%{opacity:.35} 50%{opacity:1} }
  .score-label{ font-size:.72rem; color:var(--ink-soft); font-weight:700; }
  .score-wrap{text-align:right; max-width:170px;}
  .score-value{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:1.9rem; line-height:1.1;
    color:var(--ink); word-break:break-all;
  }

  .combo-chip{
    margin-top:2px; display:inline-block;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:.78rem;
    color:#fff; background:linear-gradient(160deg,#FF7A6B,#FF8C42);
    padding:3px 10px; border-radius:999px; box-shadow:0 4px 10px rgba(255,122,107,.45);
  }
  .combo-chip.pop{ animation:comboPop .4s ease; }
  .combo-chip.breakaway{ animation:comboBreak .32s ease forwards; }
  @keyframes comboPop{ 0%{transform:scale(.5)} 60%{transform:scale(1.25)} 100%{transform:scale(1)} }
  @keyframes comboBreak{ 0%{transform:scale(1);opacity:1} 100%{transform:scale(.55);opacity:0} }

  .final-medals-row{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }

  main.board{
    position:relative; overflow:hidden; background:#0d1122;
    border-radius:20px; padding:16px 12px 20px; min-height:260px;
    display:flex; flex-direction:column; justify-content:flex-end; gap:4px;
  }

  /* per-round timer */
  .timer-chip{
    text-align:center; font-family:'Baloo 2', sans-serif; font-weight:800;
    font-size:1.5rem; color:var(--ink-soft); line-height:1; padding:4px 0 2px;
  }
  .timer-chip.urgent{ color:#FF6B6B; animation:timerPulse .5s ease infinite; }
  @keyframes timerPulse{ 50%{transform:scale(1.12)} }

  .trail{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    max-height:180px; overflow-y:auto; scroll-behavior:smooth;
  }
  .trail-row{
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
    gap:4px 6px; transform:scale(.6); transform-origin:center; transition:opacity .3s ease;
  }
  .trail-arrow{font-size:.9rem; color:var(--ink-soft); opacity:.5; margin:-2px 0;}
  .mini-bubble{
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:.95rem;
    background:var(--bubble-bg); border:2px solid var(--bubble-border); color:#3a4870;
  }
  .mini-bubble.gold{ background:linear-gradient(160deg,#FFE580,var(--gold)); border-color:var(--gold-deep); color:var(--gold-text);}
  .mini-plus{ font-size:.85rem; color:var(--ink-soft); font-weight:700;}

  .current-row{ padding-top:6px; }
  .goal-chip{
    display:flex; align-items:center; justify-content:center; gap:6px;
    text-align:center; margin:0 auto 10px; width:fit-content;
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:800; font-size:.95rem;
    color:var(--gold-text); background:linear-gradient(160deg,#FFE580,#FFD23F);
    border:2px solid var(--gold-deep); border-radius:999px; padding:7px 18px;
    box-shadow:0 0 14px rgba(255,210,63,.45);
  }
  .goal-chip b{ font-family:'Baloo 2', sans-serif; font-size:1.25rem; }
  .equation{ display:flex; align-items:center; justify-content:center; flex-wrap:nowrap; gap:4px 5px; }
  .plus{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:1.1rem; color:var(--ink-soft);}

  .bubble{
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.2rem;
    background:var(--bubble-bg); border:3px solid var(--bubble-border);
    box-shadow:0 6px 14px var(--bubble-shadow);
    cursor:pointer; user-select:none; color:#1a2240;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .bubble:hover{ transform:translateY(-3px); }
  .bubble:focus-visible{ outline:3px solid var(--gold-deep); outline-offset:3px; }
  .bubble.selected{
    border-color:var(--gold-deep);
    box-shadow:0 0 0 5px rgba(255,140,66,.32), 0 6px 14px var(--bubble-shadow);
    transform:scale(1.1) translateY(-2px);
  }
  .bubble.gold{
    background:linear-gradient(160deg,#FFE580,var(--gold));
    border-color:var(--gold-deep); color:var(--gold-text);
  }
  .bubble.pulse-gold{ animation:popGold .6s ease; }
  .bubble.pulse-normal{ animation:popNormal .45s ease; }
  @keyframes popGold{
    0%{ transform:scale(.6) rotate(0deg); box-shadow:0 0 0 rgba(255,209,74,0); }
    35%{ transform:scale(1.55) rotate(-6deg); box-shadow:0 0 34px 14px rgba(255,209,74,.9); }
    55%{ transform:scale(1.25) rotate(5deg); box-shadow:0 0 26px 10px rgba(255,209,74,.75); }
    75%{ transform:scale(1.35) rotate(-2deg); box-shadow:0 0 30px 12px rgba(255,209,74,.8); }
    100%{ transform:scale(1) rotate(0deg); box-shadow:0 6px 14px var(--bubble-shadow); }
  }
  @keyframes popNormal{ 0%{transform:scale(.75)} 55%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @media (prefers-reduced-motion: reduce){ .bubble.pulse-gold, .bubble.pulse-normal{ animation:none; } }

  .board-flash{
    position:absolute; inset:0; border-radius:20px; pointer-events:none;
    background:radial-gradient(circle, rgba(255,210,63,.65) 0%, rgba(255,140,66,.25) 45%, rgba(255,210,63,0) 72%);
    opacity:0; z-index:5;
  }
  .board-flash.active{ animation:boardFlash .6s ease-out; }
  .board-flash.active-super{
    animation:boardFlashSuper .75s ease-out;
    background:conic-gradient(from 0deg, #FFD23F, #FF6B6B, #6BCBFF, #B79CFF, #6BFFB8, #FFD23F);
  }
  @keyframes boardFlash{ 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
  @keyframes boardFlashSuper{ 0%{opacity:0} 18%{opacity:.85} 100%{opacity:0} }

  .app.shake{ animation:appShake .45s ease; }
  .app.shake-big{ animation:appShakeBig .55s ease; }
  @keyframes appShake{
    10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)}
  }
  @keyframes appShakeBig{
    10%,90%{transform:translateX(-3px) rotate(-.3deg)} 20%,80%{transform:translateX(6px) rotate(.3deg)}
    30%,50%,70%{transform:translateX(-11px) rotate(-.5deg)} 40%,60%{transform:translateX(11px) rotate(.5deg)}
  }

  .confetti-particle{
    position:fixed; border-radius:50%; pointer-events:none; z-index:80;
    animation-name:confettiBurst; animation-timing-function:cubic-bezier(.2,.7,.3,1); animation-fill-mode:forwards;
  }
  @keyframes confettiBurst{
    0%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.25) rotate(180deg); opacity:0; }
  }

  .plus-ten-float{
    position:fixed; z-index:90; pointer-events:none;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:1.6rem;
    color:var(--gold-deep); text-shadow:0 2px 3px rgba(255,255,255,.8), 0 0 10px rgba(255,209,74,.7);
    animation:floatUp .9s ease-out forwards; white-space:nowrap;
  }
  .plus-ten-float.super{
    font-size:2rem;
    background:linear-gradient(90deg,#FF6B6B,#FFD23F,#6BCBFF,#B79CFF);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 14px rgba(255,140,66,.6);
  }
  @keyframes floatUp{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:0; }
    18%{ opacity:1; transform:translate(-50%,-65%) scale(1.25); }
    100%{ transform:translate(-50%,-190%) scale(1); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .board-flash.active, .board-flash.active-super, .app.shake, .app.shake-big,
    .confetti-particle, .plus-ten-float{ animation:none !important; opacity:0 !important; }
  }

  /* mode select */
  .mode-select{ text-align:center; padding:22px 8px 8px; }
  .game-title{
    font-family:'DotGothic16', monospace; font-size:1.5rem;
    color:var(--gold); text-shadow:2px 2px 0 #000; margin:0 0 6px; letter-spacing:.05em;
  }
  .mode-select-sub{ font-size:.85rem; color:var(--ink-soft); font-weight:700; margin:0 0 22px; }
  .mode-buttons{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .mode-btn{
    border:3px solid #39456f; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:6px; padding:18px 28px; border-radius:14px;
    background:#1b2140; color:var(--ink);
    box-shadow:0 4px 0 rgba(0,0,0,.4); transition:transform .15s ease, box-shadow .15s ease;
  }
  .mode-btn:hover{ transform:translateY(-3px); }
  .mode-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.4); }
  .mode-btn:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }
  .mode-btn-num{ font-family:'DotGothic16', monospace; font-size:2.2rem; line-height:1; }
  .mode-btn-label{ font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:.82rem; }
  .mode-btn-10{
    background:linear-gradient(160deg,#FFE580,var(--gold)); border-color:var(--gold-deep);
    color:var(--gold-text); box-shadow:0 4px 0 #b35a1c;
  }
  .mode-btn-10:active{ box-shadow:0 1px 0 #b35a1c; }
  .mode-btn-20{
    background:linear-gradient(160deg,#3A466F,#2b3252); border-color:#4DA3FF;
    color:#BFD0FF; box-shadow:0 4px 0 #0d1530;
  }
  .mode-btn-20:active{ box-shadow:0 1px 0 #0d1530; }

  /* settings chips */
  .opt-section{ margin:20px 0 6px; display:flex; flex-direction:column; gap:10px; }
  .opt-row-wrap{ display:flex; align-items:center; gap:8px; justify-content:center; }
  .opt-label{ font-size:.78rem; color:var(--ink-soft); font-weight:700; width:52px; text-align:right; flex-shrink:0; }
  .opt-row{ display:flex; gap:6px; }
  .opt-chip{
    border:2px solid #39456f; background:#1b2140; color:var(--ink-soft);
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:700; font-size:.82rem;
    padding:5px 12px; border-radius:8px; cursor:pointer;
    transition:background .12s, color .12s, border-color .12s;
  }
  .opt-chip.active{ background:var(--gold); border-color:var(--gold-deep); color:var(--gold-text); }
  .opt-chip:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .switch-mode-link{
    display:block; margin:14px auto 0; background:none; border:none;
    color:var(--ink-soft); font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:700; font-size:.78rem; text-decoration:underline; cursor:pointer;
  }

  .bubble.final-burst{ animation:finalBurst 1s ease-out forwards; pointer-events:none; }
  @keyframes finalBurst{
    0%  { transform:scale(1); }
    25% { transform:scale(1.6); box-shadow:0 0 0 10px rgba(255,210,63,.55), 0 0 32px 14px rgba(255,210,63,.45); }
    65% { transform:scale(1.45); box-shadow:0 0 0 6px rgba(255,210,63,.35), 0 0 22px 8px rgba(255,210,63,.3); }
    100%{ transform:scale(1.4); box-shadow:0 0 0 4px rgba(255,210,63,.25), 0 0 16px 6px rgba(255,210,63,.2); }
  }
  .star-particle{
    position:fixed; z-index:90; pointer-events:none; font-size:1.15rem; line-height:1;
    animation:starBurst .95s ease-out forwards;
  }
  @keyframes starBurst{
    0%  { transform:translate(-50%,-50%) scale(0); opacity:1; }
    35% { transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.3); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.6); opacity:0; }
  }
  @media (prefers-reduced-motion:reduce){ .bubble.final-burst{animation:none} .star-particle{display:none} }

  .hint{ text-align:center; font-size:.82rem; color:var(--ink-soft); margin:12px 0 0; font-weight:700; }

  .back-link{
    display:block; margin:16px auto 0; text-align:center;
    font-size:.75rem; color:var(--ink-soft); font-weight:700; text-decoration:none; opacity:.7;
  }
  .back-link:hover{ opacity:1; }

  /* final screen */
  .final-screen{
    text-align:center; padding:28px 16px 22px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .final-score-label{ font-size:.8rem; color:var(--ink-soft); font-weight:700; margin-bottom:-12px; }
  .final-score-val{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:3rem; line-height:1.1;
    color:var(--gold); text-shadow:0 0 20px rgba(255,210,63,.5);
  }
  .final-medals-row{ font-size:1.15rem; font-weight:700; letter-spacing:.12em; color:var(--ink); }
</style>
</head>
<body>

<div class="ambient" id="ambient" aria-hidden="true"></div>

<div class="stage">
  <div class="app" id="appRoot">

    <!-- MODE SELECT -->
    <div class="mode-select" id="modeSelect">
      <h1 class="game-title">Make 10! Speed Link</h1>
      <p class="mode-select-sub">どっちで あそぶ？</p>
      <div class="mode-buttons">
        <button class="mode-btn mode-btn-10" data-target="10" type="button">
          <span class="mode-btn-num">10</span>
          <span class="mode-btn-label">10をつくる</span>
        </button>
        <button class="mode-btn mode-btn-20" data-target="20" type="button">
          <span class="mode-btn-num">20</span>
          <span class="mode-btn-label">20をつくる</span>
        </button>
      </div>
      <div class="opt-section">
        <div class="opt-row-wrap">
          <span class="opt-label">なんもん？</span>
          <div class="opt-row" id="cfgRounds">
            <button class="opt-chip" data-val="5" type="button">5</button>
            <button class="opt-chip active" data-val="10" type="button">10</button>
            <button class="opt-chip" data-val="20" type="button">20</button>
          </div>
        </div>
        <div class="opt-row-wrap">
          <span class="opt-label">じかん？</span>
          <div class="opt-row" id="cfgTime">
            <button class="opt-chip" data-val="15" type="button">15秒</button>
            <button class="opt-chip" data-val="30" type="button">30秒</button>
            <button class="opt-chip active" data-val="0" type="button">∞</button>
          </div>
        </div>
        <div class="opt-row-wrap">
          <span class="opt-label">BGM</span>
          <div class="opt-row" id="cfgBgm">
            <button class="opt-chip active" data-val="race" type="button">レース</button>
            <button class="opt-chip" data-val="panic" type="button">パニック</button>
            <button class="opt-chip" data-val="off" type="button">なし</button>
          </div>
        </div>
      </div>
      <a href="../index.html" class="back-link">← ゲームせんたくにもどる</a>
    </div>

    <!-- GAME SCREEN -->
    <div class="game-screen" id="gameScreen" hidden>
      <header class="topbar">
        <div class="round-track" id="roundTrack"></div>
        <div class="score-wrap">
          <div class="score-label">スコア</div>
          <div class="score-value" id="scoreValue">0</div>
          <div class="combo-chip" id="comboChip" hidden></div>
        </div>
      </header>

      <main class="board">
        <div class="board-flash" id="boardFlash"></div>
        <div class="timer-chip" id="timerChip" hidden>⏱ <span id="timerVal">30</span></div>
        <div class="trail" id="trail"></div>
        <div class="current-row">
          <div class="goal-chip" id="goalChip"></div>
          <div class="equation" id="equation"></div>
        </div>
      </main>

      <p class="hint" id="hint">2つの すうじを タップしてね</p>
    </div>

    <!-- FINAL SCREEN -->
    <div class="final-screen" id="finalScreen" hidden>
      <h2 class="game-title">ゲームクリア！</h2>
      <div class="final-score-label">スコア</div>
      <div class="final-score-val" id="finalScoreVal"></div>
      <div class="final-medals-row" id="finalMedalsRow"></div>
      <button class="switch-mode-link" id="menuBackBtn" type="button">← メニューにもどる</button>
      <a href="../index.html" class="back-link">← ゲームせんたくにもどる</a>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- ambient ----------
  const ambient = document.getElementById('ambient');
  for(let i=0;i<10;i++){
    const s = document.createElement('span');
    const size = 14 + Math.random()*34;
    s.style.width = size+'px'; s.style.height = size+'px';
    s.style.left = (Math.random()*100)+'vw';
    s.style.animationDuration = (14 + Math.random()*14)+'s';
    s.style.animationDelay = (Math.random()*14)+'s';
    ambient.appendChild(s);
  }

  // ---------- config ----------
  const cfg = { rounds: 10, timePerRound: 0, bgm: 'race' };

  // ---------- state ----------
  let numbers = [], selectedId = null, score = 0, tensCount = 0, trail = [];
  let round = 1, idCounter = 1, resultShown = false;
  let animatingIds = new Set(), maxPossibleTens = 0, roundTens = 0;
  let goldCount = 0, silverCount = 0, bronzeCount = 0, currentTarget = 10;
  let combo = 0, selectTime = null;
  let roundResults = {};

  const bigUnits = ['','万','億','兆','京','垓','秭','穣','溝','澗','正','載','極','恒河沙','阿僧祇','那由他','不可思議','無量大数'];
  function formatScoreDisplay(num){
    num = Math.floor(num);
    if(num < 10000) return num.toLocaleString('ja-JP');
    const digits = String(num), groups = [];
    let i = digits.length;
    while(i > 0){ const start = Math.max(0, i-4); groups.unshift(digits.slice(start, i)); i = start; }
    let out = ''; const total = groups.length;
    groups.forEach((g, k) => {
      const v = parseInt(g, 10); if(!v) return;
      out += v + (bigUnits[total-1-k] || '');
    });
    return out || '0';
  }
  function computeSpeedMultiplier(ms){
    const s = ms/1000;
    if(s <= 1.2) return 3; if(s <= 2.5) return 2; if(s <= 5) return 1.5; return 1;
  }

  const els = {
    equation:     document.getElementById('equation'),
    trail:        document.getElementById('trail'),
    scoreValue:   document.getElementById('scoreValue'),
    roundTrack:   document.getElementById('roundTrack'),
    goalChip:     document.getElementById('goalChip'),
    comboChip:    document.getElementById('comboChip'),
    appRoot:      document.getElementById('appRoot'),
    boardFlash:   document.getElementById('boardFlash'),
    modeSelect:   document.getElementById('modeSelect'),
    gameScreen:   document.getElementById('gameScreen'),
    finalScreen:  document.getElementById('finalScreen'),
    hint:         document.getElementById('hint'),
    timerChip:    document.getElementById('timerChip'),
    timerVal:     document.getElementById('timerVal'),
    finalScoreVal:document.getElementById('finalScoreVal'),
    finalMedalsRow:document.getElementById('finalMedalsRow'),
    menuBackBtn:  document.getElementById('menuBackBtn'),
  };

  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  const REDUCE_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- audio ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(ctx, freq, startTime, duration, type, gainPeak){
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(gainPeak, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(startTime); osc.stop(startTime + duration + 0.03);
  }
  function playTenFanfare(c){
    const ctx = ensureAudio(); if(!ctx) return;
    const now = ctx.currentTime;
    const ratio = Math.pow(2, Math.min((c-1)*2, 12)/12);
    [523.25,659.25,783.99,1046.50].map(f=>f*ratio).forEach((f,i)=>playTone(ctx,f,now+i*.085,.32,'triangle',.24));
    playTone(ctx,1568*ratio,now+.30,.24,'sine',.13);
    playTone(ctx,2093*ratio,now+.34,.20,'sine',.10);
    if(c>=5){ playTone(ctx,2637*ratio,now+.38,.22,'sine',.10); playTone(ctx,3136*ratio,now+.42,.18,'sine',.08); }
  }
  function playMergeTick(){ const ctx=ensureAudio(); if(!ctx) return; playTone(ctx,392,ctx.currentTime,.12,'sine',.08); }
  function playFinalChime(){
    const ctx = ensureAudio(); if(!ctx) return;
    const now = ctx.currentTime;
    [[523.25,0],[659.25,.075],[783.99,.15],[1046.5,.225]].forEach(([f,d])=>playTone(ctx,f,now+d,.38,'triangle',.28));
    playTone(ctx,2093,now+.32,.22,'sine',.12);
  }

  // ---------- BGM ----------
  const bgmState = { playing:false, timer:null, nextTime:0, step:0 };

  function bgmPressure(){
    const p = cfg.rounds > 0 ? (round-1)/cfg.rounds : 0;
    return p >= 0.8 ? 1.3 : p >= 0.6 ? 1.15 : 1;
  }
  function bNote(freq, t, dur, type, vol){
    const ctx = ensureAudio(); if(!ctx) return;
    playTone(ctx, freq, t, dur, type, vol);
  }
  function bgmStep(s, t, dt){
    const pr = bgmPressure();
    if(s%4===0) bNote(65.41, t, dt*1.8, 'sawtooth', .022);
    if(s===0)   bNote(1568/pr, t, .07, 'square', .048);
    if(s===8)   bNote(1244/pr, t, .07, 'square', .048);
    if(cfg.bgm === 'race'){
      const arp = [523.25,659.25,783.99,1046.5,783.99,659.25];
      if(s%2===0) bNote(130.81, t, dt*1.6, 'sawtooth', .026);
      if(s%2===1) bNote(arp[(bgmState.step>>1)%arp.length], t, dt*1.2, 'triangle', .026);
    } else if(cfg.bgm === 'panic'){
      if(s===0){ bNote(1800/pr, t, .025, 'square', .05); bNote(55, t, dt*15, 'sawtooth', .018); }
      if(s===8)  bNote(1400/pr, t, .025, 'square', .05);
      const pa = [220,277.18,329.63,369.99,440,369.99,329.63,277.18];
      bNote(pa[s%8], t, dt*.85, 'square', .028);
    }
  }
  function bgmTick(){
    if(!bgmState.playing) return;
    const ctx = ensureAudio(); if(!ctx) return;
    const base = cfg.bgm==='panic' ? 118 : 152;
    const dt = 60/(base*bgmPressure())/4;
    while(bgmState.nextTime < ctx.currentTime+.12){
      bgmStep(bgmState.step%16, bgmState.nextTime, dt);
      bgmState.nextTime += dt; bgmState.step++;
    }
  }
  function bgmStart(){
    if(cfg.bgm==='off') return;
    bgmStop();
    const ctx = ensureAudio(); if(!ctx) return;
    bgmState.playing = true; bgmState.step = 0; bgmState.nextTime = ctx.currentTime+.05;
    bgmState.timer = setInterval(bgmTick, 25);
  }
  function bgmStop(){
    bgmState.playing = false;
    if(bgmState.timer){ clearInterval(bgmState.timer); bgmState.timer = null; }
  }

  // ---------- per-round timer ----------
  let roundTimerInterval = null, roundTimeLeft = 0;

  function startRoundTimer(){
    clearRoundTimer();
    if(cfg.timePerRound === 0){ els.timerChip.hidden = true; return; }
    roundTimeLeft = cfg.timePerRound;
    updateTimerDisplay();
    els.timerChip.hidden = false;
    roundTimerInterval = setInterval(() => {
      roundTimeLeft--;
      updateTimerDisplay();
      if(roundTimeLeft <= 0){ clearRoundTimer(); onRoundTimeout(); }
    }, 1000);
  }
  function clearRoundTimer(){
    if(roundTimerInterval){ clearInterval(roundTimerInterval); roundTimerInterval = null; }
    els.timerChip.hidden = true;
    els.timerChip.classList.remove('urgent');
  }
  function updateTimerDisplay(){
    els.timerVal.textContent = roundTimeLeft;
    els.timerChip.classList.toggle('urgent', roundTimeLeft <= 5);
  }
  function onRoundTimeout(){
    if(resultShown) return;
    resultShown = true;
    bronzeCount++; roundResults[round]='bronze';
    renderRoundTrack();
    playFinalChime();
    els.goalChip.innerHTML = '⏱ じかんぎれ！';
    els.goalChip.hidden = false;
    els.hint.textContent = '';
    setTimeout(() => {
      if(round >= cfg.rounds){ showFinalResult(); } else { newRound(); }
    }, 1100);
  }

  // ---------- celebration fx ----------
  function spawnStars(el){
    if(REDUCE_MOTION) return;
    const rect = el.getBoundingClientRect();
    const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
    ['⭐','✨','⭐','✨','⭐','✨'].forEach((star,i) => {
      const s = document.createElement('div');
      s.className = 'star-particle'; s.textContent = star;
      const angle = (i/6)*Math.PI*2-Math.PI/2, dist = 48+Math.random()*18;
      s.style.left = cx+'px'; s.style.top = cy+'px';
      s.style.setProperty('--dx', (Math.cos(angle)*dist)+'px');
      s.style.setProperty('--dy', (Math.sin(angle)*dist)+'px');
      s.style.animationDelay = (i*.04)+'s';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 1000);
    });
  }
  function spawnConfetti(x, y, c){
    if(REDUCE_MOTION) return;
    const gc=['#FFD23F','#FF8C42','#FFF3D0','#FFFFFF','#FFE580'];
    const rc=['#FFD23F','#FF6B6B','#6BCBFF','#B79CFF','#6BFFB8','#FF9FC0'];
    const colors = c>=5 ? rc : gc, count = Math.min(16+(c-1)*6, 42);
    for(let i=0;i<count;i++){
      const p = document.createElement('div'); p.className='confetti-particle';
      const angle=Math.random()*Math.PI*2, dist=45+Math.random()*85;
      p.style.setProperty('--dx', (Math.cos(angle)*dist)+'px');
      p.style.setProperty('--dy', (Math.sin(angle)*dist-25)+'px');
      p.style.left=x+'px'; p.style.top=y+'px';
      const size=4+Math.random()*7; p.style.width=size+'px'; p.style.height=size+'px';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration=(0.55+Math.random()*.35)+'s';
      document.body.appendChild(p); setTimeout(()=>p.remove(), 1000);
    }
  }
  function spawnPlusTen(x, y, c, sm){
    if(REDUCE_MOTION) return;
    const el = document.createElement('div');
    el.className = 'plus-ten-float'+(c>=5?' super':'');
    let label='+10'; if(c>=2) label+=' ×'+c; if(sm>1) label+=' 🚀×'+sm;
    el.textContent=label; el.style.left=x+'px'; el.style.top=y+'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(), 950);
  }
  function triggerBoardFlash(c){
    if(REDUCE_MOTION) return;
    els.boardFlash.classList.remove('active','active-super');
    void els.boardFlash.offsetWidth;
    els.boardFlash.classList.add(c>=5?'active-super':'active');
    setTimeout(()=>els.boardFlash.classList.remove('active','active-super'), 750);
  }
  function triggerShake(c){
    if(REDUCE_MOTION) return;
    els.appRoot.classList.remove('shake','shake-big');
    void els.appRoot.offsetWidth;
    els.appRoot.classList.add(c>=3?'shake-big':'shake');
    setTimeout(()=>els.appRoot.classList.remove('shake','shake-big'), 560);
  }
  function updateComboChip(c){
    if(c>=2){
      els.comboChip.textContent=(c>=5?'🔥🔥 ':'🔥 ')+c+'れんぞく！';
      els.comboChip.hidden=false;
      els.comboChip.classList.remove('breakaway','pop');
      void els.comboChip.offsetWidth;
      els.comboChip.classList.add('pop');
    }
  }
  function resetCombo(){
    const had = combo>=2; combo=0;
    if(had){
      els.comboChip.classList.remove('pop'); els.comboChip.classList.add('breakaway');
      setTimeout(()=>{ els.comboChip.hidden=true; els.comboChip.classList.remove('breakaway'); }, 320);
    } else { els.comboChip.hidden=true; }
  }
  function celebrateTen(bubbleEl, c, sm){
    playTenFanfare(c); triggerBoardFlash(c); triggerShake(c);
    if(bubbleEl){
      const rect=bubbleEl.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      spawnConfetti(cx,cy,c); spawnPlusTen(cx,cy,c,sm);
    }
    updateComboChip(c);
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }

  function maxTens(values, target){
    const memo = new Map();
    function solve(remaining){
      if(!remaining.length) return 0;
      const key = remaining.slice().sort((a,b)=>a-b).join(',');
      if(memo.has(key)) return memo.get(key);
      let best = solve(remaining.slice(1));
      const first=remaining[0], rest=remaining.slice(1), n=rest.length;
      for(let mask=1;mask<(1<<n);mask++){
        let sum=first; const chosen=[];
        for(let b=0;b<n;b++){ if(mask&(1<<b)){ sum+=rest[b]; chosen.push(b); } }
        if(sum===target){
          const val=1+solve(rest.filter((_,idx)=>!chosen.includes(idx)));
          if(val>best) best=val;
        }
      }
      memo.set(key,best); return best;
    }
    return solve(values.slice());
  }

  // ---------- equation generation ----------
  const pairsPool10 = [[1,9],[2,8],[3,7],[4,6],[5,5]];
  const triplesPool20 = [[9,8,3],[9,7,4],[9,6,5],[8,7,5],[7,7,6],[9,9,2],[8,8,4],[8,6,6]];

  function generateEquation(target){
    let values;
    if(target===20){
      const t1=triplesPool20[randInt(0,triplesPool20.length-1)];
      const t2=triplesPool20[randInt(0,triplesPool20.length-1)];
      values=[...t1,...t2];
    } else {
      const p1=pairsPool10[randInt(0,pairsPool10.length-1)];
      const p2=pairsPool10[randInt(0,pairsPool10.length-1)];
      values=[p1[0],p1[1],p2[0],p2[1],randInt(1,9),randInt(1,9)];
    }
    shuffle(values);
    return values.map(v=>({id:idCounter++, value:v}));
  }

  // ---------- game flow ----------
  function startGame(target){
    currentTarget=target; round=1; score=0; tensCount=0;
    goldCount=0; silverCount=0; bronzeCount=0; roundResults={};
    selectedId=null; trail=[]; resultShown=false; roundTens=0; combo=0; selectTime=null;
    els.comboChip.hidden=true;
    numbers=generateEquation(currentTarget);
    maxPossibleTens=maxTens(numbers.map(n=>n.value), currentTarget);
    els.modeSelect.hidden=true; els.finalScreen.hidden=true; els.gameScreen.hidden=false;
    els.hint.textContent='2つの すうじを タップしてね';
    render();
    bgmStart();
    startRoundTimer();
  }

  function newRound(){
    round++;
    numbers=generateEquation(currentTarget);
    trail=[]; selectedId=null; resultShown=false; roundTens=0;
    maxPossibleTens=maxTens(numbers.map(n=>n.value), currentTarget);
    els.hint.textContent='2つの すうじを タップしてね';
    render();
    startRoundTimer();
  }

  function showFinalResult(){
    bgmStop(); clearRoundTimer();
    const ctx=ensureAudio();
    if(ctx){
      const now=ctx.currentTime;
      [523.25,659.25,783.99,1046.5,1318.5,1568.0].forEach((f,i)=>playTone(ctx,f,now+i*.1,.5,'triangle',.22));
    }
    els.gameScreen.hidden=true; els.finalScreen.hidden=false;
    els.finalScoreVal.textContent=formatScoreDisplay(score);
    els.finalMedalsRow.innerHTML='';
    for(let i=1; i<=cfg.rounds; i++){
      const dot=document.createElement('div');
      dot.className='round-dot '+(roundResults[i]||'bronze');
      els.finalMedalsRow.appendChild(dot);
    }
  }

  // ---------- rendering ----------
  function renderRoundTrack(){
    els.roundTrack.innerHTML='';
    for(let i=1; i<=cfg.rounds; i++){
      const dot=document.createElement('div');
      dot.className='round-dot';
      if(roundResults[i]) dot.classList.add(roundResults[i]);
      else if(i===round) dot.classList.add('current');
      els.roundTrack.appendChild(dot);
    }
  }
  function render(){
    renderGoal(); renderTrail(); renderEquation();
    renderRoundTrack();
    els.scoreValue.textContent=formatScoreDisplay(score);
  }
  function renderGoal(){
    if(maxPossibleTens>0){
      els.goalChip.innerHTML='🎯 「'+currentTarget+'」は さいだい <b>'+maxPossibleTens+'</b> かい つくれるよ';
      els.goalChip.hidden=false;
    } else { els.goalChip.hidden=true; }
  }
  function renderTrail(){
    els.trail.innerHTML='';
    trail.forEach(snapshot=>{
      const row=document.createElement('div'); row.className='trail-row';
      snapshot.forEach((v,idx)=>{
        if(idx>0){ const pl=document.createElement('span'); pl.className='mini-plus'; pl.textContent='+'; row.appendChild(pl); }
        const mb=document.createElement('div'); mb.className='mini-bubble'; mb.textContent=v; row.appendChild(mb);
      });
      els.trail.appendChild(row);
      const arr=document.createElement('div'); arr.className='trail-arrow'; arr.textContent='↓'; els.trail.appendChild(arr);
    });
    els.trail.scrollTop=els.trail.scrollHeight;
  }
  function renderEquation(){
    els.equation.innerHTML='';
    numbers.forEach((n,idx)=>{
      if(idx>0){ const pl=document.createElement('span'); pl.className='plus'; pl.textContent='+'; els.equation.appendChild(pl); }
      const b=document.createElement('button');
      b.type='button'; b.className='bubble'; b.textContent=n.value; b.dataset.id=String(n.id);
      if(n.id===selectedId) b.classList.add('selected');
      if(n.gold) b.classList.add('gold');
      if(animatingIds.has(n.id)) b.classList.add(n.gold?'pulse-gold':'pulse-normal');
      b.setAttribute('aria-label','すうじ '+n.value);
      b.addEventListener('click',()=>onBubbleClick(n.id));
      els.equation.appendChild(b);
    });
    if(numbers.length===1 && !resultShown){
      resultShown=true;
      setTimeout(showResult, 750);
    }
  }
  function showResult(){
    clearRoundTimer();
    const isPerfect = maxPossibleTens>0 && roundTens===maxPossibleTens;
    let medalIcon, medalLabel;
    if(isPerfect){         goldCount++;   medalIcon='🥇'; medalLabel='コンプリート！';   roundResults[round]='gold'; }
    else if(roundTens>=1){ silverCount++; medalIcon='🥈'; medalLabel=roundTens+'/'+maxPossibleTens+' みつけた！'; roundResults[round]='silver'; }
    else {                 bronzeCount++; medalIcon='🥉'; medalLabel='つぎがんばろう';  roundResults[round]='bronze'; }
    renderRoundTrack();
    playFinalChime();
    const bubbleEl=els.equation.querySelector('.bubble');
    if(bubbleEl){ bubbleEl.classList.add('final-burst'); spawnStars(bubbleEl); }
    els.goalChip.innerHTML=medalIcon+' '+medalLabel;
    els.goalChip.hidden=false; els.hint.textContent='';
    setTimeout(()=>{ if(round>=cfg.rounds){ showFinalResult(); } else { newRound(); } }, 1100);
  }

  // ---------- interaction ----------
  function onBubbleClick(id){
    if(resultShown) return;
    if(selectedId===null){ selectedId=id; selectTime=performance.now(); render(); return; }
    if(selectedId===id){ selectedId=null; render(); return; }
    doMerge(selectedId, id); selectedId=null;
  }
  function doMerge(idA, idB){
    const idxA=numbers.findIndex(n=>n.id===idA), idxB=numbers.findIndex(n=>n.id===idB);
    if(idxA===-1||idxB===-1) return;
    const a=numbers[idxA], b=numbers[idxB], sum=a.value+b.value;
    const isGold=sum===currentTarget;
    trail.push(numbers.map(n=>n.value));
    const insertAt=Math.min(idxA,idxB);
    const newBubble={id:idCounter++, value:sum, gold:isGold};
    numbers=numbers.filter(n=>n.id!==idA&&n.id!==idB);
    numbers.splice(insertAt,0,newBubble);
    const sm=isGold ? computeSpeedMultiplier(selectTime!==null?(performance.now()-selectTime):9999) : 1;
    if(isGold){
      combo++; const cb=Math.min((combo-1)*2,20); score+=Math.round((10+cb)*sm);
      tensCount++; roundTens++;
    } else { score+=2; }
    animatingIds=new Set([newBubble.id]); render();
    if(isGold){ celebrateTen(els.equation.querySelector('[data-id="'+newBubble.id+'"]'), combo, sm); }
    else { playMergeTick(); resetCombo(); }
    setTimeout(()=>{ animatingIds=new Set(); render(); }, 620);
  }

  // ---------- settings wiring ----------
  function wireOptRow(containerId, cfgKey, asNumber){
    const container=document.getElementById(containerId);
    container.querySelectorAll('.opt-chip').forEach(btn=>{
      btn.addEventListener('click',()=>{
        container.querySelectorAll('.opt-chip').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        cfg[cfgKey]=asNumber ? Number(btn.dataset.val) : btn.dataset.val;
      });
    });
  }
  wireOptRow('cfgRounds','rounds',true);
  wireOptRow('cfgTime','timePerRound',true);
  wireOptRow('cfgBgm','bgm',false);

  // ---------- event handlers ----------
  document.querySelectorAll('.mode-btn[data-target]').forEach(btn=>{
    btn.addEventListener('click',()=>startGame(Number(btn.dataset.target)));
  });
  els.menuBackBtn.addEventListener('click',()=>{
    bgmStop(); els.finalScreen.hidden=true; els.modeSelect.hidden=false;
  });

})();
</script>
</body>
</html>
